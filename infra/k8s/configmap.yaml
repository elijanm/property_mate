apiVersion: v1
kind: ConfigMap
metadata:
  name: pms-config
  namespace: pms
data:
  APP_ENV: "production"
  APP_VERSION: "0.1.0"
  MONGO_DB: "pms"
  MONGO_MAX_POOL_SIZE: "50"
  REDIS_URL: "redis://redis-service:6379/0"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq-service:5672/"
  OPENSEARCH_HOST: "opensearch-service"
  OPENSEARCH_PORT: "9200"
  OPENSEARCH_USE_SSL: "false"
  OPENSEARCH_VERIFY_CERTS: "false"
  S3_BUCKET_NAME: "pms-media"
  S3_REGION: "us-east-1"
  LOG_LEVEL: "INFO"
  OTEL_SERVICE_NAME: "pms-backend"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "60"
