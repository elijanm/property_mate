global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: pms-backend
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /metrics

  - job_name: pms-worker
    static_configs:
      - targets: ['worker:9091']
    metrics_path: /metrics
