# Headscale 0.23 configuration for PMS IoT ops plane
# Docs: https://headscale.net/ref/configuration/

server_url: http://headscale:8080

listen_addr: 0.0.0.0:8080
metrics_listen_addr: 127.0.0.1:9090

# gRPC (used by headscale CLI)
grpc_listen_addr: 0.0.0.0:50443
grpc_allow_insecure: true

# Private keys — auto-generated on first run
private_key_path: /var/lib/headscale/private.key
noise:
  private_key_path: /var/lib/headscale/noise_private.key

# IP address pool assigned to VPN nodes
prefixes:
  v4: 100.64.0.0/10
  allocation: sequential

# SQLite database
database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite

# DERP relay — use Tailscale public servers in dev
derp:
  server:
    enabled: false
    region_id: 999
    region_code: headscale
    region_name: Headscale Embedded DERP
    stun_listen_addr: 0.0.0.0:3478
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  auto_update_enabled: true
  update_frequency: 24h

# DNS pushed to connected nodes
dns:
  magic_dns: true
  base_domain: pms.internal
  nameservers:
    global:
      - 1.1.1.1
      - 8.8.8.8

# Ephemeral node expiry
node_update_check_interval: 10s

# Policy mode: "database" enables GET/PUT /api/v1/policy REST API.
# "file" mode stores policy in a static file and disables the API (returns 500).
policy:
  mode: database

log:
  level: info
  format: text
