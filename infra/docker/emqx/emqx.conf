## EMQX v5 configuration for PMS IoT
## Only override what differs from EMQX defaults.
## Docs: https://www.emqx.io/docs/en/v5/configuration/configuration.html

node {
  name = "emqx@pms_emqx"
  cookie = "pms-emqx-secret-cookie"
  data_dir = "/opt/emqx/data"
}

log {
  file_handlers.default {
    level = info
    file = "/opt/emqx/log/emqx.log"
    rotation_count = 5
    rotation_size = 50MB
  }
  console_handler {
    level = warning
  }
}

dashboard {
  listeners.http {
    bind = 18083
  }
}

## ── MQTT Listeners ────────────────────────────────────────────────────────

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 50000
}

## mTLS listener — devices authenticate with X.509 client certificates.
## Run scripts/gen-certs.sh before starting the stack to create certs/.
listeners.ssl.default {
  bind = "0.0.0.0:8883"
  max_connections = 50000
  ssl_options {
    certfile            = "/opt/emqx/etc/certs/server.crt"
    keyfile             = "/opt/emqx/etc/certs/server.key"
    cacertfile          = "/opt/emqx/etc/certs/ca.crt"
    verify              = verify_peer
    fail_if_no_peer_cert = true
    versions            = [tlsv1.3, tlsv1.2]
  }
}

## WebSocket listener (default path /mqtt is used by EMQX automatically)
listeners.ws.default {
  bind = "0.0.0.0:8083"
}

## Secure WebSocket — use the same server cert as the mTLS MQTT listener.
## Disabled in plain-TCP dev setups by pointing at the same certs we generated.
listeners.wss.default {
  bind = "0.0.0.0:8084"
  ssl_options {
    certfile   = "/opt/emqx/etc/certs/server.crt"
    keyfile    = "/opt/emqx/etc/certs/server.key"
    cacertfile = "/opt/emqx/etc/certs/ca.crt"
    versions   = [tlsv1.3, tlsv1.2]
  }
}

## ── Authentication (CONNECT) ──────────────────────────────────────────────
## MQTT CONNECT is validated via the IoT service HTTP hook.
## IoT service checks device_uid + bcrypt password against MongoDB.
## Response: HTTP 200 {"result": "allow"} or {"result": "deny"}

authentication = [
  {
    mechanism = password_based
    backend = http
    method = post
    url = "http://iot-service:8020/api/v1/internal/emqx/auth/connect"
    headers {
      "Content-Type" = "application/json"
      "X-Internal-Secret" = "changeme-internal-secret"
    }
    body {
      username         = "${username}"
      password         = "${password}"
      clientid         = "${clientid}"
      peerhost         = "${peerhost}"
      ## cert_common_name is populated by EMQX only for mTLS connections.
      ## The IoT service uses it as a fallback if peer_cert_as_username hasn't
      ## replaced username yet (e.g. "d:<device_uid>" from the cert CN).
      cert_common_name = "${cert_common_name}"
    }
    pool_size = 32
    connect_timeout = 5s
    request_timeout = 5s
    enable_pipelining = 100
  }
]

## ── Authorization (PUB/SUB) ───────────────────────────────────────────────

authorization {
  no_match = deny
  deny_action = disconnect
  cache {
    enable = true
    max_size = 10000
    ttl = 60s
  }
  sources = [
    {
      type = http
      enable = true
      method = post
      url = "http://iot-service:8020/api/v1/internal/emqx/auth/acl"
      headers {
        "Content-Type" = "application/json"
        "X-Internal-Secret" = "changeme-internal-secret"
      }
      body {
        username         = "${username}"
        clientid         = "${clientid}"
        topic            = "${topic}"
        action           = "${action}"
        peerhost         = "${peerhost}"
        cert_common_name = "${cert_common_name}"
      }
      pool_size = 32
      connect_timeout = 5s
      request_timeout = 5s
    }
  ]
}

## ── MQTT protocol settings ────────────────────────────────────────────────

mqtt {
  max_packet_size = 1MB
  max_clientid_len = 128
  max_topic_levels = 8
  max_qos_allowed = 2
  session_expiry_interval = 2h
  max_inflight = 128
  max_mqueue_len = 1024

}
