server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the ML service
    location /api/ {
        proxy_pass             http://ml-service:8030/api/;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout  10s;
        proxy_read_timeout     120s;
        proxy_send_timeout     30s;
        # Retry on connection errors only (not on POST/PUT to avoid double-sends)
        proxy_next_upstream    error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # SSE — disable buffering so events flow immediately
    location /api/v1/events {
        proxy_pass              http://ml-service:8030/api/v1/events;
        proxy_http_version      1.1;
        proxy_set_header        Connection '';
        proxy_set_header        Host $host;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        chunked_transfer_encoding on;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
