server {
    listen 80;
    server_name _;
    # 308 preserves the HTTP method (POST stays POST); 301 would silently downgrade to GET
    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/self.crt;
    ssl_certificate_key /etc/nginx/ssl/self.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the ML service
    location /api/ {
        proxy_pass         http://ml-service:8030/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # SSE — disable buffering so events flow immediately
    location /api/v1/events {
        proxy_pass             http://ml-service:8030/api/v1/events;
        proxy_http_version     1.1;
        proxy_set_header       Connection '';
        proxy_set_header       Host $host;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        chunked_transfer_encoding on;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
